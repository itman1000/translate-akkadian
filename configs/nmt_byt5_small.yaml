# NMT (ByT5-base) 設定
model_name_or_path: google/byt5-base
max_source_length: 384
max_target_length: 384
val_ratio: 0.1
seed: 42

val_split_unit: doc           # 分割単位: row | doc
val_doc_id_col: oare_id       # doc 分割時の文書ID列
val_source_col: source        # 任意の列。例: aligned/ocr
val_exclude_sources: [ocr, evacun]    # val から除外（trainには残す）
val_holdout_all_sources: true # true の場合、val 文書の全行を train から除外
learning_rate: 0.0005
num_train_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
weight_decay: 0.0001
max_grad_norm: 1.0
warmup_ratio: 0.1
lr_scheduler_type: linear
step_decay_steps: 0
step_decay_gamma: 0.0
logging_steps: 50
eval_steps: 999999
save_steps: 999999
save_total_limit: 1
predict_with_generate: true
generation_max_length: 320
generation_max_new_tokens: 320
num_beams: 4
length_penalty: 0.8
early_stopping: true
no_repeat_ngram_size: 20
repetition_penalty: 1.15

# 提出の安全策 / 後処理
force_single_sentence: true
single_sentence_mode: merge  # 単文化モード: merge | truncate
normalize_output: true        # 推論出力の表記ゆれを軽く正規化
normalize_output_fractions: true  # 分数/小数の正規化を有効化
normalize_output_units: true      # 数値+単位のスペース補正を有効化

# infer_nmt 用デコードプリセット（train_nmt は上記設定を常に使用）
decode_preset: cfg
fp16: false
gradient_checkpointing: false
dropout_rate: 0.1
attention_dropout_rate: 0.1
