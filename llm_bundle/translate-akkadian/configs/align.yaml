# マイルストーン1のアライン設定
data_dir: data
artifacts_dir: artifacts
aligned_format: parquet
variants: A,B,C
min_len_ratio: 0.25
max_len_ratio: 4.0
min_src_tokens: 3
min_tgt_chars: 20
min_alpha_ratio: 0.3
max_digit_ratio: 0.3
min_align_score: 0.3
min_token_align_score: 0.3
min_src_alpha_ratio: 0.3
max_src_digit_ratio: 0.3
max_src_symbol_ratio: 0.25
max_tgt_symbol_ratio: 0.25
max_tgt_sentence_endings: 1
min_tgt_tokens: 3
max_tgt_tokens: 80
max_src_tokens: 120
max_src_chars: 600
max_tgt_chars: 600
max_tgt_per_src: 1
max_src_per_tgt: 2
drop_tgt_trailing_quote: true
drop_tgt_odd_quote: true

# OARE sentence hints: doc-level selection (A/B safety)
oare_doc_select: true
oare_min_anchors: 1
oare_tie_break: oare
