# NMT (ByT5-base) 設定
model_name_or_path: google/byt5-base
max_source_length: 384
max_target_length: 384
val_ratio: 0.1
seed: 42
learning_rate: 5e-5
num_train_epochs: 1
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 4
weight_decay: 0.0001
max_grad_norm: 1.0
warmup_ratio: 0.1
lr_scheduler_type: linear
step_decay_steps: 0
step_decay_gamma: 0.0
logging_steps: 50
eval_steps: 200
save_steps: 999999
save_total_limit: 1
predict_with_generate: true
generation_max_length: 320
generation_max_new_tokens: 320
num_beams: 2
length_penalty: 0.8
early_stopping: true
no_repeat_ngram_size: 20
repetition_penalty: 1.15

# Submission safety / postprocess
force_single_sentence: true
single_sentence_mode: merge  # merge | truncate

# Decode preset for infer_nmt (train_nmt always uses the values above)
decode_preset: cfg
fp16: false
gradient_checkpointing: false
dropout_rate: 0.1
attention_dropout_rate: 0.1
